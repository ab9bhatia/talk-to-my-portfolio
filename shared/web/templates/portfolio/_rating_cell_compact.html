{% if h.get('rating_label') %}
<span
  class="rating-badge rating-badge-compact rating-{{ h.get('rating_slug') or 'unknown' }}"
  title="{% if h.get('buy_thesis') %}{{ h.buy_thesis }}{% else %}{{ h.get('rating_label') }}{% endif %}"
>{{ signal_short(h.get('rating_label')) }}</span>
{% else %}
<span class="cell-muted">—</span>
{% endif %}
